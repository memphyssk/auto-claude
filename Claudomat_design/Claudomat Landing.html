<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Claudomat — Landing Wireframes</title>
<link rel="stylesheet" href="crt.css"/>
<style>
  html, body { margin: 0; background: #1a1410; }
  body { font-family: 'IBM Plex Mono', ui-monospace, monospace; color: #e8c8a0; }
  /* nudge canvas bg toward warm dark so artboards float on amber haze */
  .dc-root { background: #1a1410 !important; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="crt-shared.jsx"></script>
<script type="text/babel" src="w1-boot.jsx"></script>
<script type="text/babel" src="w2-console.jsx"></script>
<script type="text/babel" src="w3-manifesto.jsx"></script>
<script type="text/babel" src="w4-schematic.jsx"></script>
<script type="text/babel" src="w5-shell.jsx"></script>
<script type="text/babel" src="w6-dossier.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useEffect, useState } = React;

// Klaatu konami egg — a tiny detail. Type "ash" anywhere on the page.
function useAshEgg() {
  const [active, setActive] = useState(false);
  useEffect(() => {
    let buf = '';
    const onKey = (e) => {
      buf = (buf + e.key).slice(-3).toLowerCase();
      if (buf === 'ash') { setActive(true); setTimeout(() => setActive(false), 5000); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return active;
}

function App() {
  const ash = useAshEgg();
  return (
    <>
      {ash && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 999, pointerEvents: 'none',
          background: 'radial-gradient(circle, rgba(255,80,30,0.08), transparent 60%)',
          display: 'flex', alignItems: 'flex-end', justifyContent: 'center', padding: 40,
          fontFamily: 'VT323, monospace', color: '#ff7a2a', fontSize: 22, letterSpacing: '0.2em',
          textShadow: '0 0 8px rgba(255,122,42,0.6)'
        }}>
          /// I CAN'T LIE TO YOU ABOUT YOUR CHANCES, BUT YOU HAVE MY SYMPATHIES ///
        </div>
      )}

      <DesignCanvas>
        <DCSection id="claudomat-hero" title="CLAUDOMAT · landing-page wireframes" subtitle="MU/TH/UR 6000 / Nostromo CRT vibe · 6 directions to compare side-by-side">

          <DCArtboard id="w1" label="W1 · BOOT SEQUENCE / TUI MENU" width={1200} height={2400}>
            <W1Boot/>
          </DCArtboard>

          <DCArtboard id="w2" label="W2 · MU/TH/UR CONSOLE (split-pane)" width={1200} height={1300}>
            <W2Console/>
          </DCArtboard>

          <DCArtboard id="w3" label="W3 · MANIFESTO-FIRST / TYPOGRAPHIC" width={1200} height={2400}>
            <W3Manifesto/>
          </DCArtboard>

          <DCArtboard id="w4" label="W4 · SCHEMATIC / DEPENDENCY GRAPH" width={1200} height={1900}>
            <W4Schematic/>
          </DCArtboard>

          <DCArtboard id="w5" label="W5 · LIVE SHELL / COMMAND-DRIVEN" width={1200} height={1600}>
            <W5Shell/>
          </DCArtboard>

          <DCArtboard id="w6" label="W6 · CLASSIFIED DOSSIER" width={1200} height={2400}>
            <W6Dossier/>
          </DCArtboard>

        </DCSection>
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
