<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Terminal window</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-1); }
  body { padding: 22px; }
  .win { border: 1px solid var(--border-1); background: rgba(0,0,0,0.55); }
  .chrome { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border-1); background: rgba(255,122,42,0.05); }
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .body { padding: 14px 18px; }
  .bubble { padding: 8px 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.55; }
  .from { display: flex; gap: 10px; align-items: center; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-2); margin-bottom: 3px; }
  .from span:first-child { color: var(--fg-accent); }
  .rule { flex: 1; height: 1px; background: var(--border-1); opacity: 0.5; }
  .op { background: rgba(255,255,255,0.02); border-left: 2px solid var(--border-1); }
  .ag { background: rgba(255,122,42,0.04); border-left: 2px solid var(--color-amber); }
  .meta { font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.12em; margin-left: 12px; }
</style>
</head><body>
  <div class="win">
    <div class="chrome">
      <div class="dots">
        <span class="dot" style="background:#d44a1c;box-shadow:0 0 4px #d44a1c;"></span>
        <span class="dot" style="background:#c4521b;opacity:0.6;"></span>
        <span class="dot" style="background:#b8d97a;box-shadow:0 0 4px #b8d97a;"></span>
        <span class="meta">◆ claudomat ~ operator-session-#A937</span>
      </div>
      <div class="from"><span class="crt-led crt-led-ok"></span> connected · tty0</div>
    </div>
    <div class="body">
      <div>
        <div class="from"><span>◆ claudomat</span><span class="rule"></span><span>MON · 08:00</span></div>
        <div class="bubble ag"><span style="color:var(--fg-accent);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;">/// weekly digest · auto</span><div style="margin-top:6px;">shipped: <span style="color:var(--fg-accent);">async collab</span>, <span style="color:var(--fg-accent);">SSO</span>. revenue <span style="color:var(--fg-accent);">$18,420</span> (+11%). nothing requires you.</div></div>
      </div>
      <div>
        <div class="from"><span style="color:var(--fg-1);">▸ operator</span><span class="rule"></span><span>WED · 22:14</span></div>
        <div class="bubble op">gut feeling: market is shifting toward small teams. worth taking seriously.</div>
      </div>
    </div>
  </div>
</body></html>
