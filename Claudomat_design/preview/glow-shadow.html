<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Glow &amp; Shadow</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 18px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-content: start; }
  .demo { padding: 18px 14px; border: 1px solid var(--border-1); display: flex; align-items: center; justify-content: center; min-height: 80px; }
  .meta { font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
</style>
</head><body>
  <div>
    <div class="meta">/// glow · soft (body)</div>
    <div class="demo"><span style="color:var(--fg-accent);font-family:var(--font-display);font-size:36px;text-shadow:var(--glow-soft);">CLAUDOMAT</span></div>
  </div>
  <div>
    <div class="meta">/// glow · strong (hero)</div>
    <div class="demo"><span style="color:var(--fg-accent);font-family:var(--font-display);font-size:36px;text-shadow:var(--glow-strong);">CLAUDOMAT</span></div>
  </div>
  <div>
    <div class="meta">/// no shadow boxes — borders only</div>
    <div class="demo">FRAMES NEVER USE OUTSET SHADOW</div>
  </div>
  <div>
    <div class="meta">/// LEDs · 4px halo</div>
    <div class="demo crt-row" style="gap:14px;justify-content:center;">
      <span class="crt-led"></span><span class="crt-led crt-led-ok"></span><span class="crt-led crt-led-warn"></span>
    </div>
  </div>
</body></html>
