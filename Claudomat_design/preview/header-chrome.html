<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Header chrome</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 18px; }
  .bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border: 1px solid var(--border-1); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-2); margin-bottom: 12px; }
  .bar > div { display: flex; gap: 14px; align-items: center; }
  .key { color: var(--fg-accent); text-shadow: var(--glow-soft); }
  .meta { font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
</style>
</head><body>
  <div class="meta">/// designation · node · screen no.   //   live LEDs · timecode</div>
  <div class="bar">
    <div>
      <span class="key">◆ OPERATING SYSTEM</span>
      <span>NODE: CLAUDOMAT.DEV</span>
      <span>SCR-00</span>
    </div>
    <div>
      <span class="crt-row" style="gap:6px;"><span class="crt-led crt-led-ok"></span>LINK</span>
      <span class="crt-row" style="gap:6px;"><span class="crt-led crt-led-ok"></span>PWR</span>
      <span class="crt-row" style="gap:6px;"><span class="crt-led crt-led-warn"></span>REC</span>
      <span>14:22:09 UTC</span>
    </div>
  </div>
  <div class="meta">/// section marker · used between page sections</div>
  <div class="bar" style="border:0;border-top:1px dashed var(--border-1);border-bottom:1px dashed var(--border-1);">
    <span>§04 · OPERATING LOG</span>
    <span>excerpt · day 47 · 03:22 — 04:11 UTC</span>
  </div>
</body></html>
