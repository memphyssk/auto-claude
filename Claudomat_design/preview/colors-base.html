<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Colors · Brand</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .swatch { border: 1px solid var(--border-1); padding: 10px 12px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; }
  .swatch .chip { width: 100%; height: 38px; margin-bottom: 8px; }
  .swatch .name { font-size: var(--text-tiny); text-transform: uppercase; letter-spacing: var(--tracking-label-lg); color: var(--fg-2); }
  .swatch .hex  { font-size: var(--text-base); color: var(--fg-accent); margin-top: 2px; }
</style>
</head><body>
  <div class="label" style="margin-bottom:10px;">▸ BASE PALETTE · BRAND</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#0a0807;border:1px solid var(--border-2);"></div><div class="name">bg</div><div class="hex">#0a0807</div></div>
    <div class="swatch"><div class="chip" style="background:#110d0a;"></div><div class="name">bg-2</div><div class="hex">#110d0a</div></div>
    <div class="swatch"><div class="chip" style="background:#1a1410;"></div><div class="name">bg-3</div><div class="hex">#1a1410</div></div>
    <div class="swatch"><div class="chip" style="background:#ff7a2a;box-shadow:0 0 18px rgba(255,122,42,0.4);"></div><div class="name">amber · primary</div><div class="hex">#ff7a2a</div></div>
    <div class="swatch"><div class="chip" style="background:#c4521b;"></div><div class="name">amber-dim</div><div class="hex">#c4521b</div></div>
    <div class="swatch"><div class="chip" style="background:#ffb27a;"></div><div class="name">phosphor</div><div class="hex">#ffb27a</div></div>
  </div>
</body></html>
