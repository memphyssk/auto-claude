<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>LEDs &amp; load bars</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .meta { font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.12em; }
  .row { display: flex; gap: 18px; align-items: center; }
</style>
</head><body>
  <div class="meta">/// LEDs · amber · ok · warn</div>
  <div class="row">
    <span class="crt-row" style="gap:6px;"><span class="crt-led"></span><span style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-2);">REC</span></span>
    <span class="crt-row" style="gap:6px;"><span class="crt-led crt-led-ok"></span><span style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-2);">LINK</span></span>
    <span class="crt-row" style="gap:6px;"><span class="crt-led crt-led-warn"></span><span style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-2);">ALERT</span></span>
  </div>
  <div class="meta">/// load bars</div>
  <div class="crt-stack" style="gap:3px;">
    <div class="crt-spread" style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-2);"><span>CPU</span><span style="color:var(--fg-accent);">072%</span></div>
    <div class="crt-bar"><div class="crt-bar-fill" style="right:28%;"></div></div>
  </div>
  <div class="crt-stack" style="gap:3px;">
    <div class="crt-spread" style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-2);"><span>MEM</span><span style="color:var(--fg-accent);">041%</span></div>
    <div class="crt-bar"><div class="crt-bar-fill" style="right:59%;"></div></div>
  </div>
  <div class="meta">/// cursor styles</div>
  <div class="row" style="font-family:var(--font-mono);font-size:14px;">
    <span>operator@claudomat:~$ <span class="crt-cursor"></span></span>
    <span>operator@claudomat:~$ <span class="crt-cursor-thin"></span></span>
  </div>
</body></html>
