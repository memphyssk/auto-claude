<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-content: start; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .meta { font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.12em; }
</style>
</head><body>
  <div class="stack">
    <div class="meta">/// primary · default</div>
    <button class="crt-btn">▸ TRANSMIT</button>
    <div class="meta">/// primary · hover (preview)</div>
    <button class="crt-btn" style="background:var(--color-amber);color:var(--color-bg);box-shadow:0 0 18px var(--color-amber-faint);">▸ TRANSMIT</button>
  </div>
  <div class="stack">
    <div class="meta">/// ghost · default</div>
    <button class="crt-btn crt-btn-ghost">▸ DECLINE</button>
    <div class="meta">/// ghost · hover (preview)</div>
    <button class="crt-btn crt-btn-ghost" style="border-color:var(--color-amber);color:var(--color-amber);">▸ DECLINE</button>
  </div>
</body></html>
