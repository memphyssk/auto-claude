<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Colors · Text</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: 32px 1fr 110px 90px; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .swatch { width: 28px; height: 28px; border: 1px solid var(--border-2); }
  .name { font-size: var(--text-base); text-transform: uppercase; letter-spacing: var(--tracking-label); }
  .role { font-size: var(--text-tiny); color: var(--fg-2); text-transform: uppercase; letter-spacing: var(--tracking-label); }
  .hex  { font-size: var(--text-base); color: var(--fg-accent); text-align: right; }
</style>
</head><body>
  <div class="label" style="margin-bottom:10px;">▸ TEXT &amp; STATE</div>
  <div class="row"><div class="swatch" style="background:#e8c8a0;"></div><div class="name" style="color:#e8c8a0;">aa text · body</div><div class="role">fg-1</div><div class="hex">#e8c8a0</div></div>
  <div class="row"><div class="swatch" style="background:#8a6a4a;"></div><div class="name" style="color:#8a6a4a;">aa text · dim</div><div class="role">fg-2</div><div class="hex">#8a6a4a</div></div>
  <div class="row"><div class="swatch" style="background:#5a4530;"></div><div class="name" style="color:#5a4530;">aa text · faint</div><div class="role">fg-3</div><div class="hex">#5a4530</div></div>
  <div class="row"><div class="swatch" style="background:#b8d97a;box-shadow:0 0 8px #b8d97a;"></div><div class="name" style="color:#b8d97a;">ok / signal</div><div class="role">ok</div><div class="hex">#b8d97a</div></div>
  <div class="row"><div class="swatch" style="background:#d44a1c;box-shadow:0 0 8px #d44a1c;"></div><div class="name" style="color:#d44a1c;">warn / alert</div><div class="role">warn</div><div class="hex">#d44a1c</div></div>
</body></html>
