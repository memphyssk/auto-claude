<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="../crt.css"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: 80px 1fr 90px; gap: 12px; align-items: center; padding: 4px 0; }
  .name { font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.12em; }
  .bar { background: var(--color-amber); height: 10px; box-shadow: 0 0 6px var(--color-amber-faint); }
  .px { font-size: 11px; color: var(--fg-accent); text-align: right; }
</style>
</head><body>
  <div class="label" style="margin-bottom:10px;">▸ SPACING · TIGHT, MECHANICAL STEPS</div>
  <div class="row"><div class="name">space-1</div><div><div class="bar" style="width:4px;"></div></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">space-2</div><div><div class="bar" style="width:6px;"></div></div><div class="px">6 px</div></div>
  <div class="row"><div class="name">space-3</div><div><div class="bar" style="width:8px;"></div></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">space-4</div><div><div class="bar" style="width:10px;"></div></div><div class="px">10 px</div></div>
  <div class="row"><div class="name">space-5</div><div><div class="bar" style="width:14px;"></div></div><div class="px">14 px</div></div>
  <div class="row"><div class="name">space-6</div><div><div class="bar" style="width:18px;"></div></div><div class="px">18 px</div></div>
  <div class="row"><div class="name">space-7</div><div><div class="bar" style="width:22px;"></div></div><div class="px">22 px</div></div>
  <div class="row"><div class="name">space-8</div><div><div class="bar" style="width:32px;"></div></div><div class="px">32 px</div></div>
  <div class="row"><div class="name">space-9</div><div><div class="bar" style="width:40px;"></div></div><div class="px">40 px</div></div>
  <div class="row"><div class="name">space-10</div><div><div class="bar" style="width:56px;"></div></div><div class="px">56 px</div></div>
  <div class="row"><div class="name">space-11</div><div><div class="bar" style="width:80px;"></div></div><div class="px">80 px</div></div>
</body></html>
